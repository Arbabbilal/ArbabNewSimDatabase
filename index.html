<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝐀𝐫𝐛𝐚𝐛 ✘ 𝐀𝐑 SIM DATABASE</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

body {
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at center, #000 0%, #020202 100%);
  color: #fff;
  text-align: center;
  margin: 0;
  padding: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.title-border {
  padding: 12px 28px;
  font-size: 28px;
  font-weight: 700;
  text-shadow: 0 0 12px #00fff7;
  margin-bottom: 20px;
}

.subtitle {
  color: #aaa;
  font-size: 14px;
  margin-bottom: 25px;
}

.simdata-wrap {
  background: rgba(20,20,20,0.85);
  border-radius: 15px;
  padding: 30px;
  width: 90%;
  max-width: 420px;
}

input {
  width: 100%;
  padding: 12px;
  background: #111;
  color: #fff;
  border: 1px solid #444;
  border-radius: 8px;
  outline: none;
}

button {
  margin-top: 15px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #0ff;
  font-weight: bold;
  cursor: pointer;
}

.loading { color: #0ff; }
.simdata-error { color: red; }

.result-container {
  margin-top: 15px;
  text-align: left;
  background: rgba(15,15,15,0.8);
  border-radius: 8px;
  padding: 15px;
}

.result-label { color: #0ff; font-weight: bold; }
.result-value { margin-bottom: 8px; }
</style>
</head>

<body>

<div class="title-border">
  𝘼𝙣o𝙣𝙮𝙢o𝙪𝙨
</div>

<p class="subtitle">SIM / CNIC INFORMATION RETRIEVAL SYSTEM</p>

<div class="simdata-wrap">
  <form id="simdata-form">
    <input id="simdata_query" type="text" placeholder="ENTER NUMBER OR CNIC" required>
    <button type="submit">SEARCH DATA</button>
  </form>

  <div id="simdata-results" class="result-container">
    WAITING... INPUT ANY NO.
  </div>
</div>

<script>
jQuery(document).ready(function($){

  $('#simdata-form').on('submit', function(e){
    e.preventDefault();

    let input = $('#simdata_query').val().trim();
    if(!input){
      alert('Please enter number or CNIC');
      return;
    }

    $('#simdata-results').html('<div class="loading">SCANNING...</div>');

    const proxy = "https://api.allorigins.win/raw?url=";
    const apiUrl = "https://public.codexdart.site/pak.php?num=" + encodeURIComponent(input);

    $.getJSON(proxy + encodeURIComponent(apiUrl), function(response){

      if(response && response.success && response.data && response.data.length > 0){
        let d = response.data[0];

        let html = `
          <div class="result-label">NAME:</div>
          <div class="result-value">${d.name || 'N/A'}</div>

          <div class="result-label">NUMBER:</div>
          <div class="result-value">${d.number || 'N/A'}</div>

          <div class="result-label">CNIC:</div>
          <div class="result-value">${d.cnic || 'N/A'}</div>

          <div class="result-label">ADDRESS:</div>
          <div class="result-value">${d.address || 'N/A'}</div>
        `;

        $('#simdata-results').html(html);
      }
      else {
        $('#simdata-results').html('<div class="simdata-error">⚠️ No data found</div>');
      }

    }).fail(function(){
      $('#simdata-results').html('<div class="simdata-error">❌ API error / connection failed</div>');
    });

  });

});
</script>

</body>
</html>
